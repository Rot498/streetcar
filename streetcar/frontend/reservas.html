<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservas - StreetCar</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/reservas.css">
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <h2>StreetCar</h2>
    <ul>
      <li onclick="ir('dashboard.html')">📊 Dashboard</li>
      <li onclick="ir('veiculos.html')">🚗 Veículos</li>
      <li onclick="ir('clientes.html')">👤 Clientes</li>
      <li onclick="ir('locacoes.html')">📄 Locações</li>
      <li class="active">📅 Reservas</li>
      <li onclick="logout()">🚪 Sair</li>
    </ul>
    <div class="badge-perfil">👑 ADMINISTRADOR</div>
  </aside>
  <main class="main">
    <div class="topo">
      <h1>Reservas</h1>
      <div id="userName" class="user"></div>
    </div>

    <div class="tabela">
      <h2>Lista de Reservas</h2>

      <table>
        <thead>
          <tr><th>Cliente</th><th>Veículo</th><th>Início</th><th>Fim</th><th>Status Reserva</th><th>Status Veículo</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabelaReservas"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script>
  const sessao = verificarLogin("ADMIN");
  if (sessao) {
    document.getElementById("userName").innerText = "👤 " + sessao.nome;
    carregar();
  }

  async function carregar() {
    const reservas = await apiGetReservas();
    const tbody = document.getElementById("tabelaReservas");
    tbody.innerHTML = reservas.map(r => {
      let badgeReserva = "cinza";
      if (r.status === "Pendente") badgeReserva = "roxo";
      else if (r.status === "Confirmada") badgeReserva = "laranja";

      const statusVeiculo = r.veiculo?.status || "-";
      let badgeVeiculo = "cinza";
      if (statusVeiculo === "Disponível") badgeVeiculo = "verde";
      else if (statusVeiculo === "Reservado") badgeVeiculo = "roxo";
      else if (statusVeiculo === "Alugado") badgeVeiculo = "laranja";

      const acoes = r.status === "Pendente" ? `
        <button onclick="confirmar(${r.id})" style="width:auto;padding:5px 10px;font-size:12px;">✅ Confirmar</button>
        <button onclick="cancelar(${r.id})" style="width:auto;padding:5px 10px;font-size:12px;background:#ff4d4d;">❌ Cancelar</button>
      ` : r.status === "Confirmada" ? `
        <button onclick="cancelar(${r.id})" style="width:auto;padding:5px 10px;font-size:12px;background:#ff4d4d;">❌ Cancelar</button>
      ` : '';

      return `
        <tr>
          <td>${r.cliente?.nome || "-"}</td>
          <td>${r.veiculo?.modelo || "-"}</td>
          <td>${r.dataInicio}</td>
          <td>${r.dataFim}</td>
          <td><span class="badge ${badgeReserva}">${r.status}</span></td>
          <td><span class="badge ${badgeVeiculo}">${statusVeiculo}</span></td>
          <td>
            ${acoes}
            <button onclick="excluir(${r.id})" style="width:auto;padding:5px 10px;font-size:12px;background:#555;">🗑️</button>
          </td>
        </tr>
      `;
    }).join("") || "<tr><td colspan='7' style='text-align:center;color:#aaa;'>Nenhuma reserva</td></tr>";
  }

  async function confirmar(id) {
    if (!confirm("Confirmar esta reserva? Uma locação será criada automaticamente.")) return;
    try {
      await apiConfirmarReserva(id);
      alert("✅ Reserva confirmada! Locação criada em Locações.");
      carregar();
    } catch(e) {
      alert("Erro ao confirmar reserva: " + e.message);
    }
  }

  async function cancelar(id) {
    if (!confirm("Cancelar esta reserva? O veículo voltará ao status Disponível.")) return;
    try {
      await apiCancelarReserva(id);
      carregar();
    } catch(e) {
      alert("Erro ao cancelar reserva: " + e.message);
    }
  }

  async function excluir(id) {
    if (!confirm("Excluir esta reserva?")) return;
    await apiDeletarReserva(id);
    carregar();
  }
</script>
</body>
</html>
